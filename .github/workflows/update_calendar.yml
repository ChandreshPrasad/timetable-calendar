name: Update timetable

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python generate_calendar.py
        env:
          UNI_USERNAME: ${{ secrets.UNI_USERNAME }}
          UNI_PASSWORD: ${{ secrets.UNI_PASSWORD }}

      - run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add timetable.ics
          git commit -m "update calendar" || exit 0
          git push
